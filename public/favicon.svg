<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .base { fill: #fef08a; }
        .glow { fill: #fef08a; opacity: 0.3; }
      }
      @media (prefers-color-scheme: dark) {
        .base { fill: #fef08a; }
        .glow { fill: #fef08a; opacity: 0.3; }
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Black background -->
  <rect width="64" height="64" fill="#0a0a0a"/>
  
  <!-- Glow effect -->
  <circle cx="32" cy="32" r="28" class="glow" filter="url(#glow)"/>
  
  <!-- FM text -->
  <text x="32" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="900" text-anchor="middle" class="base" filter="url(#glow)" letter-spacing="-2">FM</text>
</svg>